name: Publish Docs to OneDrive

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'
      - '*.md'

jobs:
  convert-and-upload:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Pandoc ─────────────────────────────────────────────────
      - name: Install Pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.2/pandoc-3.2-1-amd64.deb
          sudo dpkg -i pandoc-3.2-1-amd64.deb

      # ── 3. Convert all .md files to .docx ────────────────────────────────
      - name: Convert Markdown to DOCX
        run: |
          mkdir -p output

          TEMPLATE_FLAG=""
          if [ -f "docs/reference-template.docx" ]; then
            TEMPLATE_FLAG="--reference-doc=docs/reference-template.docx"
          fi

          find . -name "*.md" \
            ! -path "./.git/*" \
            ! -name "README.md" \
            | while read mdfile; do

            relpath="${mdfile#./}"
            outfile="output/${relpath%.md}.docx"
            mkdir -p "$(dirname "$outfile")"

            echo "Converting: $mdfile → $outfile"
            pandoc "$mdfile" \
              -o "$outfile" \
              $TEMPLATE_FLAG \
              --toc \
              --toc-depth=3 \
              -V geometry:margin=1in \
              --standalone
          done

      # ── 4. Get an OAuth token from Azure ──────────────────────────────────
      - name: Get Microsoft Graph token
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.AZURE_TENANT_ID }}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -d "scope=https://graph.microsoft.com/.default" \
            -d "grant_type=client_credentials")

          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # ── 5. Ensure OneDrive folder exists ──────────────────────────────────
      - name: Ensure OneDrive folder exists
        env:
          TOKEN: ${{ steps.get_token.outputs.token }}
          ONEDRIVE_FOLDER: ${{ secrets.ONEDRIVE_FOLDER }}
          ONEDRIVE_USER: ${{ secrets.ONEDRIVE_USER }}
        run: |
          ENCODED_FOLDER=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${ONEDRIVE_FOLDER}'))")
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "https://graph.microsoft.com/v1.0/users/${ONEDRIVE_USER}/drive/root:/${ENCODED_FOLDER}" \
            -H "Authorization: Bearer ${TOKEN}")

          if [ "$HTTP_STATUS" -eq 404 ]; then
            echo "Folder not found, creating it..."
            curl -s -X POST \
              "https://graph.microsoft.com/v1.0/users/${ONEDRIVE_USER}/drive/root/children" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${ONEDRIVE_FOLDER}\", \"folder\": {}, \"@microsoft.graph.conflictBehavior\": \"rename\"}"
            echo "  ✓ Folder created"
          else
            echo "  ✓ Folder already exists (HTTP $HTTP_STATUS)"
          fi

      # ── 6. Upload each .docx to OneDrive ──────────────────────────────────
      - name: Upload DOCX files to OneDrive
        env:
          TOKEN: ${{ steps.get_token.outputs.token }}
          ONEDRIVE_FOLDER: ${{ secrets.ONEDRIVE_FOLDER }}
          ONEDRIVE_USER: ${{ secrets.ONEDRIVE_USER }}
        run: |
          find output -name "*.docx" | while read docxfile; do
            filename=$(basename "$docxfile")
            echo "Uploading: $filename"

            ENCODED_PATH=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${ONEDRIVE_FOLDER}/${filename}'))")
            FILESIZE=$(wc -c < "$docxfile")

            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PUT \
              "https://graph.microsoft.com/v1.0/users/${ONEDRIVE_USER}/drive/root:/${ENCODED_PATH}:/content" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/vnd.openxmlformats-officedocument.wordprocessingml.document" \
              -H "Content-Length: ${FILESIZE}" \
              --data-binary "@$docxfile")

            HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tail -1)
            BODY=$(echo "$HTTP_RESPONSE" | head -1)
            echo "  Response: $BODY"

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "  ✓ Uploaded $filename (HTTP $HTTP_STATUS)"
            else
              echo "  ✗ Failed to upload $filename (HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

      # ── 7. Summary ────────────────────────────────────────────────────────
      - name: Print summary
        if: success()
        run: |
          COUNT=$(find output -name "*.docx" | wc -l)
          echo "✅ Successfully converted and uploaded $COUNT document(s) to OneDrive."